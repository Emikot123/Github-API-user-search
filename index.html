<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Github User Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src = "github.webp" alt = "Github User Search">
        <h1>User Search</h1>
        <label for = "search"></label><input id = "search" type = "text" placeholder = "Enter a Github Username">
        <button id = "submit" type = "submit">Search</button>
    </header>
    <main>
        <h3 id = "username">Name</h3>
        <h4 id = "name"></h4>
        <div class = user_info>
            <p>Company:</p>
            <p id = "company"></p>
        </div>
        <div class = user_info>
            <p>Amount of Repos:</p>
            <p id = "repo_amount"></p>
        </div>
        <div class = user_info>
            <p>Followers:</p>
            <p id = "followers"></p>
        </div>
        <div class = user_info>
            <p>Following:</p>
            <p id = "following"></p>
        </div>
        <div class = user_info>
            <p>Email:</p>
            <p id = "email"></p>
        </div>




    </main>
    <script src="script.js"></script>
</body>
</html>
